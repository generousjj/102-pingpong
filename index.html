<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ME102 Ping Pong Scorer</title>
    <meta name="theme-color" content="#0d0d0d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --card: #1c1c1c;
            --border: #2d2d2d;
            --text: #f5f5f5;
            --muted: #9e9e9e;
            --blue: #3B82F6;
            --green: #10B981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 24px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .sub {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            margin-top: 16px;
        }

        .card {
            display: block;
            text-decoration: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            transition: transform 0.15s, border-color 0.2s;
        }

        .card:active {
            transform: scale(0.97);
        }

        .card-team8 {
            border-color: var(--green);
        }

        .card-team8:hover {
            border-color: #34d399;
        }

        .card-public {
            border-color: var(--blue);
        }

        .card-public:hover {
            border-color: #60a5fa;
        }

        .card-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .card-team8 .card-label {
            color: var(--green);
        }

        .card-public .card-label {
            color: var(--blue);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .card-pts {
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .card-pts span {
            color: var(--text);
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="container">
        <div>
            <h1>🏓 ME102 Scorer</h1>
            <p class="sub">Ping Pong Launcher Scoring App</p>
        </div>

        <div class="cards">
            <a href="./team8/" class="card card-team8">
                <div class="card-label">Team 8 Only</div>
                <div class="card-title">Team 8 Scorer</div>
                <div class="card-desc">Custom scoring approved by instructor</div>
                <div class="card-pts">
                    5 ft: Big <span>+3</span> · Small <span>+6</span><br>
                    7 ft: Big <span>+4</span> · Small <span>+8</span>
                </div>
            </a>

            <a href="./public/" class="card card-public">
                <div class="card-label">All Teams</div>
                <div class="card-title">Class Scorer</div>
                <div class="card-desc">Standard ME102 scoring for all groups</div>
                <div class="card-pts">
                    5 ft: Big <span>+2</span> · Small <span>+4</span><br>
                    7 ft: Big <span>+4</span> · Small <span>+8</span>
                </div>
            </a>
        </div>
    </div>
</body>

</html>
